name: ci-proto

on:
  pull_request:
    paths: ["proto/**"]
  push:
    branches: [main]
    paths: ["proto/**"]

jobs:
  lint-and-gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf lint proto/
      - name: buf format check
        # --exit-code 在有未格式化文件时返回非 0
        run: buf format proto/ --exit-code --diff
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Cross-language consistency (TypeScript only)
        # 跨语言一致性只检查 TS 一侧:使用专门的 TS-only buf config(protobuf.buf.gen.ts.yaml)。
        # Go / Rust 各自 CI 已覆盖。
        run: |
          npm install -g @bufbuild/protoc-gen-es @bufbuild/protoc-gen-connect-es ts-proto
          buf generate proto/ --template proto/buf.gen.ts.yaml
          bash scripts/check-proto-consistency.sh

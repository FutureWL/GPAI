name: ci-proto-breaking

on:
  pull_request:
    paths: ["proto/**"]

jobs:
  breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf breaking proto/ --against '.git#branch=origin/main'

name: ci-go

on:
  pull_request:
    paths:
      - "apps/gateway/**"
      - "gen/go/**"
      - "go.work"
      - "proto/**"
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Install protoc-gen-go + protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$GOPATH/bin" >> "$GITHUB_PATH"
        env:
          GOPATH: /go
      - run: buf generate proto/ --template proto/buf.gen.go.yaml
      - run: cd apps/gateway && go mod download
      - run: cd apps/gateway && go test ./... -coverprofile=coverage.out
      - run: cd apps/gateway && go vet ./...
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: apps/gateway/coverage.out

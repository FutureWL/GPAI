name: ci-web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "gen/ts/**"
      - "proto/**"
      - "packages/**"
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 从根 package.json 的 packageManager 字段取 (pnpm@9.15.0)
        # 显式写 version: 9 会触发 "Multiple versions of pnpm specified" 错误
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @gpai/web typecheck || pnpm --filter @gpai/web exec tsc --noEmit
      - run: pnpm --filter @gpai/web test
      - run: pnpm --filter @gpai/web lint

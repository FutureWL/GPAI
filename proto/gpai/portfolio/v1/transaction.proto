syntax = "proto3";

package gpai.portfolio.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/FutureWL/GPAI/gen/go/gpai/portfolio/v1";

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

message Transaction {
  string id = 1;
  string portfolio_id = 2;
  string instrument_id = 3;
  Side side = 4;
  int64 quantity = 5;
  string price = 6; // decimal as string
  string fee = 7;
  google.protobuf.Timestamp executed_at = 8;
  string note = 9;
}

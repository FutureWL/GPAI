syntax = "proto3";

package gpai.common.v1;

enum Market {
  MARKET_UNSPECIFIED = 0;
  MARKET_CN = 1;
  MARKET_HK = 2;
  MARKET_US = 3;
}

enum AssetClass {
  ASSET_CLASS_UNSPECIFIED = 0;
  ASSET_CLASS_EQUITY = 1;
  ASSET_CLASS_ETF = 2;
  ASSET_CLASS_INDEX = 3;
  ASSET_CLASS_FUTURES = 4;
  ASSET_CLASS_OPTION = 5;
  ASSET_CLASS_CRYPTO = 6;
}

enum Interval {
  INTERVAL_UNSPECIFIED = 0;
  INTERVAL_1M = 1;
  INTERVAL_5M = 2;
  INTERVAL_15M = 3;
  INTERVAL_1H = 4;
  INTERVAL_1D = 5;
  INTERVAL_1W = 6;
  INTERVAL_1MO = 7;
}

message Money {
  int64 amount_minor = 1;  // 最小单位(分/仙/美分)
  string currency = 2;     // ISO 4217
}

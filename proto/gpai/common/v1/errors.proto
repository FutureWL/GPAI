syntax = "proto3";

package gpai.common.v1;
option go_package = "github.com/FutureWL/GPAI/gen/go/gpai/common/v1";

message Error {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CODE_NOT_FOUND = 1;
    CODE_INVALID_ARGUMENT = 2;
    CODE_UNAUTHENTICATED = 3;
    CODE_PERMISSION_DENIED = 4;
    CODE_RATE_LIMITED = 5;
    CODE_UPSTREAM_UNAVAILABLE = 6;
    CODE_INTERNAL = 7;
    CODE_CONFLICT = 8;
  }
  Code code = 1;
  string message = 2;
  map<string, string> details = 3;
  string request_id = 4;
}
